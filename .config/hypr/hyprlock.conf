general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vignette = 0.1
    vignette_thickness = 0.5
}

# RELOJ
label {
    monitor =
    text = $TIME
    color = rgba(122, 162, 247, 1.0) # Azul Tokyonight
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 80
    halign = center
    valign = center
}

# INPUT FIELD (Contraseña)
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(122, 162, 247)
    inner_color = rgb(26, 27, 38)
    font_color = rgb(192, 202, 245)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# USUARIO
label {
    monitor =
    text = Hola, $USER
    color = rgba(192, 202, 245, 1.0)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}
