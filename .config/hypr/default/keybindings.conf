###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# My binds
bind = $mainMod SHIFT, B, exec, killall waybar && waybar & # Restart Waybar
bind = $mainMod SHIFT, M, exec, makoctl reload && notify-send "Mako" "Configuración recargada" # Reload Mako config and send a notification
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy


### SCREENSHOT BINDS ###
# Capturar toda la pantalla y guardar en Imágenes (Super + Print)
bind = $mainMod, Print, exec, grim ~/Imágenes/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Captura Guardada"

# Seleccionar un área y copiar al portapapeles (Super + Shift + S)
# bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Captura copiada al portapapeles"

# Seleccionar un área y guardar en archivo (Super + Print)
bind = , Print, exec, grim -g "$(slurp)" - | tee ~/Imágenes/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy && notify-send "Captura realizada" "Guardada en Imágenes y copiada al portapapeles"

### AUDIO BINDS ###
# Cambiar entre altavoces y auriculares
bind = $mainMod ALT, A, exec, ~/.local/bin/toggle_audio.sh

### APPLICATION BINDS ###
# Files
bind = $mainMod, F, exec, /usr/bin/nautilus

### EWW
bind = $mainMod, N, exec, eww close sysboard || eww open sysboard
# Evitar que el widget tenga bordes o efectos de ventana normal
windowrulev2 = float, class:^(eww-sysboard)$
windowrulev2 = noborder, class:^(eww-sysboard)$
windowrulev2 = noshadow, class:^(eww-sysboard)$
windowrulev2 = move 78% 60, class:^(eww-sysboard)$ # Ajusta la posición si es necesario

# Super + Escape para abrir el menú de apagado

# Al presionar Super + Escape, abrimos eww y entramos al modo "power"
bind = $mainMod, escape, exec, eww open powermenu
bind = $mainMod, escape, submap, power

# Calendar 
bind = $mainMod, C, exec, ~/.config/eww/scripts/launch_calendar.sh


# Dentro del modo "power"
submap = power
    bind = , escape, exec, eww close powermenu
    bind = , escape, submap, reset
    # También podemos cerrar con la misma tecla original
    bind = $mainMod, escape, exec, eww close powermenu
    bind = $mainMod, escape, submap, reset
submap = reset


# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, X, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
# Super + L para bloquear la pantalla (L de Lock)
bind = $mainMod SHIFT, L, exec, hyprlock
# bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover la ventana activa con MainMod + Shift + flechas
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Presiona Super + R para entrar en modo redimensión
bind = $mainMod, R, submap, resize

submap = resize
    binde = , right, resizeactive, 10 0
    binde = , left, resizeactive, -10 0
    binde = , up, resizeactive, 0 -10
    binde = , down, resizeactive, 0 10
    
    # Presiona Escape o Enter para salir del modo redimensión
    bind = , escape, submap, reset 
    bind = , return, submap, reset 
submap = reset